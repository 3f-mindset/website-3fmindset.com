<svg xmlns="http://www.w3.org/2000/svg" width="11in" height="8.5in" viewBox="0 0 1100 850">
    <!-- Full white background -->
    <rect x="0" y="0" width="1100" height="850" fill="#ffffff" />

    <!-- Title block -->
    <rect x="30" y="24" width="1040" height="120" rx="18" fill="#ffffff" stroke="#111111"
        stroke-width="3" />
    <text x="55" y="72" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="800"
        fill="#111111">Build Strong Habits: Consistency Is King
    </text>

    <!-- Choice intro -->
    <text x="55" y="110" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700"
        fill="#111111">
        CHOICE:
    </text>
    <text x="140" y="110" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#111111">
        Keep chasing motivation and restarting, or install one habit that runs even when you do not
        feel like it.
    </text>
    <text x="55" y="134" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#333333">
        This worksheet helps you build one habit by installing structure (your anvil) and tracking
        seven straight days.
    </text>

    <!-- Left column: Habit Blueprint -->
    <rect x="30" y="165" width="520" height="610" rx="18" fill="#ffffff" stroke="#111111"
        stroke-width="3" />

    <text x="55" y="205" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800"
        fill="#111111">
        The ANVILS Blueprint
    </text>
    <text x="55" y="230" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#444444">
        Fill in each box. Keep answers short. Make it executable on your worst day.
    </text>

    <!-- A -->
    <rect x="50" y="250" width="480" height="78" rx="14" fill="#ffffff" stroke="#111111"
        stroke-width="2" />
    <text x="64" y="274" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="800"
        fill="#111111">A</text>
    <text x="92" y="274" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700"
        fill="#111111">Assign One Priority Habit</text>
    <text x="64" y="295" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#555555">
        Write one habit only. Make it specific and measurable.
    </text>
    <line x1="64" y1="312" x2="515" y2="312" stroke="#999999" stroke-width="1" />
    <text x="64" y="324" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#777777">
        My one habit (example: 10-minute walk after lunch):
    </text>

    <!-- N -->
    <rect x="50" y="338" width="480" height="78" rx="14" fill="#ffffff" stroke="#111111"
        stroke-width="2" />
    <text x="64" y="362" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="800"
        fill="#111111">N</text>
    <text x="92" y="362" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700"
        fill="#111111">Name the Cue</text>
    <text x="64" y="383" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#555555">
        Attach the habit to something that already happens every day.
    </text>
    <line x1="64" y1="400" x2="515" y2="400" stroke="#999999" stroke-width="1" />
    <text x="64" y="412" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#777777">
        After I do (existing routine), I will do (new habit):
    </text>

    <!-- V -->
    <rect x="50" y="426" width="480" height="78" rx="14" fill="#ffffff" stroke="#111111"
        stroke-width="2" />
    <text x="64" y="450" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="800"
        fill="#111111">V</text>
    <text x="92" y="450" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700"
        fill="#111111">Verify It Is Small</text>
    <text x="64" y="471" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#555555">
        Shrink it until it is nearly impossible to skip.
    </text>
    <line x1="64" y1="488" x2="515" y2="488" stroke="#999999" stroke-width="1" />
    <text x="64" y="500" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#777777">
        Minimum version I will do even on a bad day:
    </text>

    <!-- I -->
    <rect x="50" y="514" width="480" height="88" rx="14" fill="#ffffff" stroke="#111111"
        stroke-width="2" />
    <text x="64" y="538" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="800"
        fill="#111111">I</text>
    <text x="92" y="538" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700"
        fill="#111111">Install a Visible Tracker</text>
    <text x="64" y="559" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#555555">
        Choose how you will track daily. Visible beats perfect.
    </text>
    <text x="64" y="578" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#777777">
        Tracker choice (circle one): Calendar X App Notebook Other:
    </text>
    <line x1="360" y1="578" x2="515" y2="578" stroke="#999999" stroke-width="1" />

    <!-- L -->
    <rect x="50" y="612" width="480" height="88" rx="14" fill="#ffffff" stroke="#111111"
        stroke-width="2" />
    <text x="64" y="636" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="800"
        fill="#111111">L</text>
    <text x="92" y="636" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700"
        fill="#111111">Limit Friction</text>
    <text x="64" y="657" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#555555">
        Remove obstacles and add prompts before the cue happens.
    </text>
    <text x="64" y="676" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#777777">
        I will remove this obstacle:
    </text>
    <line x1="210" y1="676" x2="515" y2="676" stroke="#999999" stroke-width="1" />
    <text x="64" y="692" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#777777">
        I will add this prompt (shoes out, bottle filled, phone in other room):
    </text>
    <line x1="430" y1="692" x2="515" y2="692" stroke="#999999" stroke-width="1" />

    <!-- S -->
    <rect x="50" y="710" width="480" height="55" rx="14" fill="#ffffff" stroke="#111111"
        stroke-width="2" />
    <text x="64" y="734" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="800"
        fill="#111111">S</text>
    <text x="92" y="734" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700"
        fill="#111111">Sustain for Seven Days</text>
    <text x="64" y="753" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#555555">
        Rule: never miss twice. If you slip, adjust and do it the next day.
    </text>

    <!-- Right column: 7-day tracker -->
    <rect x="570" y="165" width="500" height="610" rx="18" fill="#ffffff" stroke="#111111"
        stroke-width="3" />
    <text x="595" y="205" font-family="Arial, Helvetica, sans-serif" font-size="22"
        font-weight="800" fill="#111111">
        Seven-Day Streak Tracker
    </text>
    <text x="595" y="230" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#444444">
        Mark an X each day you execute the habit. Add a short note if needed.
    </text>

    <!-- Tracker grid -->
    <!-- Rows -->
    <g>
        <!-- Header row -->
        <rect x="590" y="250" width="460" height="38" rx="10" fill="#ffffff" stroke="#111111"
            stroke-width="2" />
        <text x="610" y="274" font-family="Arial, Helvetica, sans-serif" font-size="12"
            font-weight="800" fill="#111111">Day</text>
        <text x="705" y="274" font-family="Arial, Helvetica, sans-serif" font-size="12"
            font-weight="800" fill="#111111">Done</text>
        <text x="805" y="274" font-family="Arial, Helvetica, sans-serif" font-size="12"
            font-weight="800" fill="#111111">Notes (tiny and honest)</text>

        <!-- Day rows -->
        <!-- Day 1 -->
        <rect x="590" y="295" width="460" height="55" rx="10" fill="#ffffff" stroke="#111111"
            stroke-width="2" />
        <text x="610" y="324" font-family="Arial, Helvetica, sans-serif" font-size="12"
            font-weight="700" fill="#111111">1</text>
        <rect x="690" y="311" width="24" height="24" fill="#ffffff" stroke="#111111"
            stroke-width="2" />
        <line x1="735" y1="338" x2="1035" y2="338" stroke="#999999" stroke-width="1" />
        <text x="735" y="306" font-family="Arial, Helvetica, sans-serif" font-size="9"
            fill="#777777">What helped? What got in the way?</text>

        <!-- Day 2 -->
        <rect x="590" y="355" width="460" height="55" rx="10" fill="#ffffff" stroke="#111111"
            stroke-width="2" />
        <text x="610" y="384" font-family="Arial, Helvetica, sans-serif" font-size="12"
            font-weight="700" fill="#111111">2</text>
        <rect x="690" y="371" width="24" height="24" fill="#ffffff" stroke="#111111"
            stroke-width="2" />
        <line x1="735" y1="398" x2="1035" y2="398" stroke="#999999" stroke-width="1" />
        <text x="735" y="366" font-family="Arial, Helvetica, sans-serif" font-size="9"
            fill="#777777">Was the cue clear? Was the habit small?</text>

        <!-- Day 3 -->
        <rect x="590" y="415" width="460" height="55" rx="10" fill="#ffffff" stroke="#111111"
            stroke-width="2" />
        <text x="610" y="444" font-family="Arial, Helvetica, sans-serif" font-size="12"
            font-weight="700" fill="#111111">3</text>
        <rect x="690" y="431" width="24" height="24" fill="#ffffff" stroke="#111111"
            stroke-width="2" />
        <line x1="735" y1="458" x2="1035" y2="458" stroke="#999999" stroke-width="1" />
        <text x="735" y="426" font-family="Arial, Helvetica, sans-serif" font-size="9"
            fill="#777777">What friction can you remove tomorrow?</text>

        <!-- Day 4 -->
        <rect x="590" y="475" width="460" height="55" rx="10" fill="#ffffff" stroke="#111111"
            stroke-width="2" />
        <text x="610" y="504" font-family="Arial, Helvetica, sans-serif" font-size="12"
            font-weight="700" fill="#111111">4</text>
        <rect x="690" y="491" width="24" height="24" fill="#ffffff" stroke="#111111"
            stroke-width="2" />
        <line x1="735" y1="518" x2="1035" y2="518" stroke="#999999" stroke-width="1" />
        <text x="735" y="486" font-family="Arial, Helvetica, sans-serif" font-size="9"
            fill="#777777">Did you protect the cue time and place?</text>

        <!-- Day 5 -->
        <rect x="590" y="535" width="460" height="55" rx="10" fill="#ffffff" stroke="#111111"
            stroke-width="2" />
        <text x="610" y="564" font-family="Arial, Helvetica, sans-serif" font-size="12"
            font-weight="700" fill="#111111">5</text>
        <rect x="690" y="551" width="24" height="24" fill="#ffffff" stroke="#111111"
            stroke-width="2" />
        <line x1="735" y1="578" x2="1035" y2="578" stroke="#999999" stroke-width="1" />
        <text x="735" y="546" font-family="Arial, Helvetica, sans-serif" font-size="9"
            fill="#777777">What reward are you using to reinforce it?</text>

        <!-- Day 6 -->
        <rect x="590" y="595" width="460" height="55" rx="10" fill="#ffffff" stroke="#111111"
            stroke-width="2" />
        <text x="610" y="624" font-family="Arial, Helvetica, sans-serif" font-size="12"
            font-weight="700" fill="#111111">6</text>
        <rect x="690" y="611" width="24" height="24" fill="#ffffff" stroke="#111111"
            stroke-width="2" />
        <line x1="735" y1="638" x2="1035" y2="638" stroke="#999999" stroke-width="1" />
        <text x="735" y="606" font-family="Arial, Helvetica, sans-serif" font-size="9"
            fill="#777777">Is the minimum version still realistic?</text>

        <!-- Day 7 -->
        <rect x="590" y="655" width="460" height="55" rx="10" fill="#ffffff" stroke="#111111"
            stroke-width="2" />
        <text x="610" y="684" font-family="Arial, Helvetica, sans-serif" font-size="12"
            font-weight="700" fill="#111111">7</text>
        <rect x="690" y="671" width="24" height="24" fill="#ffffff" stroke="#111111"
            stroke-width="2" />
        <line x1="735" y1="698" x2="1035" y2="698" stroke="#999999" stroke-width="1" />
        <text x="735" y="666" font-family="Arial, Helvetica, sans-serif" font-size="9"
            fill="#777777">What will you keep for the next 7 days?</text>
    </g>

    <!-- Reflection box -->
    <rect x="570" y="720" width="500" height="55" rx="14" fill="#ffffff" stroke="#111111"
        stroke-width="2" />
    <text x="595" y="744" font-family="Arial, Helvetica, sans-serif" font-size="12"
        font-weight="800" fill="#111111">
        Reflection (one sentence):
    </text>
    <text x="595" y="764" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#777777">
        What is helping me stick to my new habit, what makes it hard, and what will I adjust next?
    </text>

    <!-- Footer: Action steps summary -->
    <rect x="30" y="790" width="1040" height="40" rx="14" fill="#ffffff" stroke="#111111"
        stroke-width="3" />
    <text x="55" y="815" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="800"
        fill="#111111">
        Action Steps Summary:
    </text>
    <text x="205" y="815" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#111111">
        Select One (one habit) | Structure the Loop (cue, small routine, remove friction) | Stack
        the Streak (track 7 days, never miss twice)
    </text>
</svg>